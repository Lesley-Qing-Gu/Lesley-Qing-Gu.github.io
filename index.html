<!DOCTYPE html>
<html lang="en" class="js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dual wave text animation with two columns"
    />
    <meta name="keywords" content="text animation, scroll, gsap, wave" />
    <meta name="author" content="Codrops" />
    <title>Dual Wave Text Animation | Codrops</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="src/dual-wave/style.css" />
  </head>
  <body class="loading">
    <header class="frame">
      <h1 class="frame__title">Dual Wave Text Animation on Scroll</h1>
      <a class="frame__back" href="https://tympanus.net/codrops/?p=">Article</a>
      <a class="frame__archive" href="https://tympanus.net/codrops/hub/"
        >All demos</a
      >
      <a class="frame__github" href="https://github.com/codrops/">GitHub</a>
      <nav class="frame__tags">
        <a href="https://tympanus.net/codrops/demos/?tag=gsap">#gsap</a>
        <a href="https://tympanus.net/codrops/demos/?tag=scroll">#scroll</a>
      </nav>
    </header>
    <main id="smooth-wrapper" class="container">
      <div id="smooth-content">
        <div class="spacer"></div>
        <div
          class="dual-wave-wrapper"
          data-animation="dual-wave"
          data-wave-number="12"
          data-wave-speed="1"
        >
          <!-- Left Column -->
          <div class="wave-column wave-column-left">
            <div class="animated-text" data-image="bold.avif">Bold</div>

            <div class="animated-text" data-image="calm.avif">Calm</div>
            <div class="animated-text" data-image="vibrant.avif">Vibrant</div>
            <div class="animated-text" data-image="serene.avif">Serene</div>

            <div class="animated-text" data-image="wild.avif">Wild</div>
            <div class="animated-text" data-image="mystery.avif">Mystery</div>
            <div class="animated-text" data-image="energy.avif">Energy</div>

            <div class="animated-text" data-image="pure.avif">Pure</div>
            <div class="animated-text" data-image="depth.avif">Depth</div>
            <div class="animated-text" data-image="warmth.avif">Warmth</div>

            <div class="animated-text" data-image="dream.avif">Dream</div>
            <div class="animated-text" data-image="ethereal.avif">Ethereal</div>
          </div>

          <div class="image-thumbnail-wrapper">
            <img src="bold.jpg" alt="Bold" class="image-thumbnail" />
          </div>

          <!-- Right Column -->
          <div class="wave-column wave-column-right">
            <div class="animated-text">Red</div>

            <div class="animated-text">Blue</div>
            <div class="animated-text">Yellow</div>
            <div class="animated-text">Green</div>

            <div class="animated-text">Teal</div>
            <div class="animated-text">Purple</div>
            <div class="animated-text">Orange</div>

            <div class="animated-text">White</div>
            <div class="animated-text">Navy</div>
            <div class="animated-text">Amber</div>

            <div class="animated-text">Pink</div>
            <div class="animated-text">Silver</div>
          </div>
        </div>

        <div class="spacer-bottom"></div>
      </div>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>

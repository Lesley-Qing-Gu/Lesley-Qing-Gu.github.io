<!DOCTYPE html>
<html lang="en" class="js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A collection of creative text animations on scroll using GSAP"
    />
    <meta
      name="keywords"
      content="text animation, scroll, gsap, web animation"
    />
    <meta name="author" content="Codrops" />
    <title>Text Animations on Scroll | Codrops</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="src/wave-text/style.css" />
  </head>
  <body class="loading">
    <nav class="demos-nav">
      <a href="index.html" class="demo-link active">Experiment 1</a>
      <a href="dual-wave-1.html" class="demo-link">Experiment 2</a>
      <a href="dual-wave-2.html" class="demo-link">Experiment 3</a>
      <a href="dual-wave-3.html" class="demo-link">Experiment 4</a>
      <a href="dual-wave-4.html" class="demo-link">Experiment 5</a>
      <a href="dual-wave-5.html" class="demo-link">Experiment 6</a>
    </nav>
    <!-- Main Content -->
    <main id="smooth-wrapper" class="container">
      <div id="smooth-content">
        <div class="spacer"></div>
        <div class="content-container" data-animation="wave-text">
          <div class="section">
            <div class="animated-text">INFINITY</div>
          </div>

          <div class="section">
            <div class="animated-text">DISCOVERY</div>
            <div class="animated-text">WONDER</div>
            <div class="animated-text">EXPLORATION</div>
          </div>

          <div class="section">
            <div class="animated-text">ENDURING</div>
            <div class="animated-text">SUPREME</div>
            <div class="animated-text">ELOQUENT</div>
          </div>

          <div class="section">
            <div class="animated-text">TIMELESS</div>
            <div class="animated-text">REFINED</div>
            <div class="animated-text">BRILLIANT</div>
          </div>

          <div class="section">
            <div class="animated-text">HARMONY</div>
            <div class="animated-text">SEAMLESS</div>
          </div>
        </div>
        <div class="spacer-bottom"></div>
      </div>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" class="js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dual wave text animation with two columns"
    />
    <meta name="keywords" content="text animation, scroll, gsap, wave" />
    <meta name="author" content="Codrops" />
    <title>Experiment 3 - Dual Wave | Codrops</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="src/dual-wave/style.css" />
  </head>
  <body class="loading">
    <nav class="demos-nav">
      <a href="index.html" class="demo-link">Experiment 1</a>
      <a href="dual-wave-1.html" class="demo-link">Experiment 2</a>
      <a href="dual-wave-2.html" class="demo-link">Experiment 3</a>
      <a href="dual-wave-3.html" class="demo-link">Experiment 4</a>
      <a href="dual-wave-4.html" class="demo-link">Experiment 5</a>
      <a href="dual-wave-5.html" class="demo-link active">Experiment 6</a>
    </nav>
    <main id="smooth-wrapper" class="container">
      <div id="smooth-content">
        <div class="spacer"></div>

        <div
          class="dual-wave-wrapper"
          data-animation="dual-wave"
          data-wave-number="24"
          data-wave-speed="0"
        >
          <!-- Left Column -->
          <div class="wave-column wave-column-left">
            <div class="animated-text" data-image="img1.png">INFINITY</div>

            <div class="animated-text" data-image="img2.png">DISCOVERY</div>
            <div class="animated-text" data-image="test.jpg">WONDER</div>
            <div class="animated-text" data-image="img1.png">EXPLORATION</div>

            <div class="animated-text" data-image="img2.png">ENDURING</div>
            <div class="animated-text" data-image="img3.png">SUPREME</div>
            <div class="animated-text" data-image="img1.png">ELOQUENT</div>

            <div class="animated-text" data-image="img2.png">TIMELESS</div>
            <div class="animated-text" data-image="img3.png">REFINED</div>
            <div class="animated-text" data-image="img1.png">BRILLIANT</div>

            <div class="animated-text" data-image="img2.png">HARMONY</div>
            <div class="animated-text" data-image="img3.png">SEAMLESS</div>
          </div>

          <div class="image-thumbnail-wrapper">
            <img src="img1.png" alt="temp" class="image-thumbnail" />
          </div>

          <!-- Right Column -->
          <div class="wave-column wave-column-right">
            <div class="animated-text">2025</div>

            <div class="animated-text">2025</div>
            <div class="animated-text">2024</div>
            <div class="animated-text">2025</div>

            <div class="animated-text">2025</div>
            <div class="animated-text">2024</div>
            <div class="animated-text">2025</div>

            <div class="animated-text">2025</div>
            <div class="animated-text">2024</div>
            <div class="animated-text">2025</div>

            <div class="animated-text">2025</div>
            <div class="animated-text">2024</div>
          </div>
        </div>

        <div class="spacer-bottom"></div>
      </div>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
